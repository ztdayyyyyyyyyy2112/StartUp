version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nutriai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutriai_db
      POSTGRES_USER: nutriai
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriai -d nutriai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nutriai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutriai_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nutriai:password@postgres:5432/nutriai_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./ml:/app/ml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutriai_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nutriai:password@postgres:5432/nutriai_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./ml:/app/ml
    depends_on:
      - redis
      - postgres
    command: celery -A app.core.celery_app worker --loglevel=info --queues=ai,notifications,analytics

  # ── Frontend (React dev) ───────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: nutriai_frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000

  # ── pgAdmin (optional, dev only) ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nutriai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nutriai.vn
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles: ["dev"]

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: nutriai_network
